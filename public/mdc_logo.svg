<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="mdcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334EAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#081F5C;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="145"/>
    </clipPath>
  </defs>

  <!-- White circle background -->
  <circle cx="150" cy="150" r="145" fill="white"/>

  <!-- MDC letters -->
  <text
    x="150" y="170"
    font-family="Inter, Arial Black, sans-serif"
    font-size="96"
    font-weight="900"
    fill="url(#mdcGrad)"
    text-anchor="middle"
    letter-spacing="-2"
  >MDC</text>

  <!-- Subtitle -->
  <text
    x="150" y="210"
    font-family="Inter, Arial, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#2d3a5e"
    text-anchor="middle"
    letter-spacing="0.3"
  >Meta Developers Communities</text>
</svg>
